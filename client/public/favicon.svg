<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient matching the app's color scheme (Indigo to Purple) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
  </defs>

  <!-- Base Squircle with smooth rounded corners -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bgGrad)" />

  <!-- Inner CPU board outline -->
  <rect x="112" y="112" width="288" height="288" rx="48" fill="none" stroke="#FFFFFF" stroke-width="20" stroke-opacity="0.9" />

  <!-- CPU Central Core -->
  <rect x="176" y="176" width="160" height="160" rx="24" fill="#FFFFFF" />
  
  <!-- Robot Face inside the Core -->
  <!-- Eyes -->
  <circle cx="220" cy="240" r="16" fill="url(#bgGrad)" />
  <circle cx="292" cy="240" r="16" fill="url(#bgGrad)" />
  <!-- Happy mouth -->
  <path d="M 216 280 Q 256 305 296 280" fill="none" stroke="url(#bgGrad)" stroke-width="12" stroke-linecap="round" />

  <!-- CPU Pins (top) -->
  <line x1="176" y1="72" x2="176" y2="112" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-opacity="0.9" />
  <line x1="256" y1="72" x2="256" y2="112" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-opacity="0.9" />
  <line x1="336" y1="72" x2="336" y2="112" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-opacity="0.9" />

  <!-- CPU Pins (bottom) -->
  <line x1="176" y1="400" x2="176" y2="440" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-opacity="0.9" />
  <line x1="256" y1="400" x2="256" y2="440" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-opacity="0.9" />
  <line x1="336" y1="400" x2="336" y2="440" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-opacity="0.9" />

  <!-- CPU Pins (left) -->
  <line x1="72" y1="176" x2="112" y2="176" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-opacity="0.9" />
  <line x1="72" y1="256" x2="112" y2="256" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-opacity="0.9" />
  <line x1="72" y1="336" x2="112" y2="336" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-opacity="0.9" />

  <!-- CPU Pins (right) -->
  <line x1="400" y1="176" x2="440" y2="176" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-opacity="0.9" />
  <line x1="400" y1="256" x2="440" y2="256" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-opacity="0.9" />
  <line x1="400" y1="336" x2="440" y2="336" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-opacity="0.9" />
</svg>
